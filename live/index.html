<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Live · Claude</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; height:100dvh; display:flex; flex-direction:column; font:16px/1.5 system-ui,sans-serif; background:#0b0f1a; color:#e7ecf5; }
  header { padding:12px 16px; font-weight:600; border-bottom:1px solid #1d2740; display:flex; gap:10px; align-items:center; }
  #dot { width:10px; height:10px; border-radius:50%; background:#556; flex:none; }
  #dot.on{background:#3ad07a} #dot.busy{background:#f5b544} #dot.err{background:#ef5b5b}
  #where { margin-left:auto; color:#8b97b3; font-size:12px; max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:82%; padding:8px 12px; border-radius:14px; white-space:pre-wrap; word-wrap:break-word; }
  .you { align-self:flex-end; background:#243a67; border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:#182238; border-bottom-left-radius:4px; }
  .think { align-self:flex-start; background:#12172a; color:#8fa0c4; font-style:italic; font-size:14px; border-left:3px solid #3a4670; }
  .tool { align-self:flex-start; background:#1a2b1f; color:#8fd0a0; font-size:13px; }
  .sys { align-self:center; color:#8b97b3; font-size:13px; }
  #interim { align-self:flex-end; background:#1c2c50; color:#9fb4e0; border-radius:14px; padding:8px 12px; max-width:82%; font-style:italic; display:none; }
  footer { padding:16px; border-top:1px solid #1d2740; display:flex; flex-direction:column; gap:12px; align-items:center; }
  #talk { width:116px; height:116px; border-radius:50%; border:none; font-size:15px; font-weight:600; color:#fff; background:#2b57c4; transition:transform .08s, background .2s; touch-action:none; user-select:none; }
  #talk:active { transform:scale(.95); } #talk.rec{background:#e0483f; box-shadow:0 0 0 8px rgba(224,72,63,.18)} #talk.speaking{background:#7a52d8}
  .row { display:flex; gap:14px; align-items:center; justify-content:center; }
  label { color:#9fb0d0; font-size:14px; }
</style>
</head>
<body>
<header><span id="dot"></span><span>Live · Claude</span><span id="where"></span></header>
<div id="log"></div>
<div id="interim"></div>
<footer>
  <button id="talk">Hold to talk</button>
  <div class="row">
    <label><input type="checkbox" id="auto"> hands-free</label>
    <span style="color:#6b7a99;font-size:12px">headphones recommended</span>
  </div>
</footer>
<script>
const $=s=>document.querySelector(s), log=$('#log'), dot=$('#dot'), interim=$('#interim')
let ws, actx, rec, recActive=false, autoMode=false, holding=false
let playQueue=[], curSource=null, botSpeaking=false
const uuid = location.pathname.replace(/^\/+/,'').split('/')[0]

function line(cls,text){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; return d }
function sys(t){ line('sys',t) }
function setDot(c){ dot.className=c||'' }
function showInterim(t){ interim.textContent=t; interim.style.display=t?'block':'none'; log.scrollTop=log.scrollHeight }

// ---- connect (uuid from URL is the key; no password) ----
function connect(){
  if(!uuid){ sys('No session link. Get one with /live in your Telegram topic.'); setDot('err'); return }
  const proto = location.protocol==='https:'?'wss':'ws'
  ws = new WebSocket(`${proto}://${location.host}/ws`); ws.binaryType='arraybuffer'
  setDot('busy'); sys('connecting…')
  ws.onopen = ()=> ws.send(JSON.stringify({type:'auth', uuid}))
  ws.onclose= ()=>{ setDot('err'); sys('disconnected') }
  ws.onerror= ()=> setDot('err')
  ws.onmessage = async ev=>{
    if(typeof ev.data!=='string') return playChunk(ev.data)
    const m=JSON.parse(ev.data)
    if(m.type==='ready'){ setDot('on'); $('#where').textContent=(m.model||'')+'  ·  '+(m.where||''); sys('connected — talk to Claude'); ensureMic() }
    else if(m.type==='denied'){ setDot('err'); sys('link not recognized — get a fresh one with /live') }
    else if(m.type==='you'){ line('you', m.text) }
    else if(m.type==='thinking'){ line('think', m.text) }
    else if(m.type==='tool'){ line('tool', '🔧 '+m.name) }
    else if(m.type==='bot'){ line('bot', m.text) }
    else if(m.type==='turn_end'){ /* answer complete */ }
  }
}

// ---- speech-to-text in the browser (Web Speech API) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition
function ensureMic(){
  if(!SR){ sys('This browser has no speech recognition — use Chrome (Android/desktop).'); return }
  rec = new SR(); rec.lang='en-US'; rec.continuous=true; rec.interimResults=true
  rec.onresult = e=>{
    let itxt=''
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i]
      if(r.isFinal){ const t=r[0].transcript.trim(); if(t) sendText(t) }
      else itxt+=r[0].transcript
    }
    showInterim(itxt)
    if(itxt && botSpeaking) bargeIn()   // talking over the bot = interrupt
  }
  rec.onerror = ev=>{ if(ev.error==='not-allowed') sys('microphone blocked — allow it and reload') }
  rec.onend = ()=>{ recActive=false; if(autoMode || holding){ try{rec.start(); recActive=true}catch{} } }
  if(autoMode) startRec()
}
function startRec(){ if(!rec||recActive) return; try{ rec.start(); recActive=true; $('#talk').classList.add('rec') }catch{} }
function stopRec(){ if(!rec) return; holding=false; try{ rec.stop() }catch{}; $('#talk').classList.remove('rec') }
function sendText(t){ showInterim(''); line('you', t); if(ws?.readyState===1){ ws.send(JSON.stringify({type:'text', text:t})); setDot('busy') } }

$('#auto').onchange = e=>{ autoMode=e.target.checked; $('#talk').textContent=autoMode?'Listening…':'Hold to talk'; if(autoMode) startRec(); else stopRec() }
const talk=$('#talk')
talk.addEventListener('pointerdown', e=>{ e.preventDefault(); if(autoMode) return; if(actx?.state==='suspended') actx.resume(); holding=true; startRec() })
const release=e=>{ e.preventDefault(); if(autoMode) return; stopRec() }
talk.addEventListener('pointerup', release); talk.addEventListener('pointercancel', release); talk.addEventListener('pointerleave', release)

// ---- playback of the bot's voice, with barge-in ----
async function playChunk(arrayBuffer){
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)()
  try{ const b=await actx.decodeAudioData(arrayBuffer.slice(0)); playQueue.push(b); if(!botSpeaking) playNext() }catch(e){}
}
function playNext(){
  const b=playQueue.shift()
  if(!b){ botSpeaking=false; setDot('on'); $('#talk').classList.remove('speaking'); return }
  botSpeaking=true; setDot('busy'); $('#talk').classList.add('speaking')
  const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); curSource=s
  s.onended=()=>{ curSource=null; playNext() }; s.start()
}
function bargeIn(){ playQueue=[]; try{curSource?.stop()}catch{}; curSource=null; botSpeaking=false; if(ws?.readyState===1) ws.send(JSON.stringify({type:'interrupt'})) }

connect()
</script>
</body>
</html>
