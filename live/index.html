<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Live · Claude</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    color-scheme: dark light;
    /* Telegram theme variables — real ones override these when in Telegram. */
    --tg-theme-bg-color:#17212b; --tg-theme-secondary-bg-color:#232e3c;
    --tg-theme-text-color:#f5f5f5; --tg-theme-hint-color:#7d8b99;
    --tg-theme-button-color:#3390ec; --tg-theme-button-text-color:#ffffff;
    --tg-theme-link-color:#6ab7ff; --tg-theme-header-bg-color:#17212b;
    --out:#2b5278;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0;height:100dvh;display:flex;flex-direction:column;
    font:15px/1.4 -apple-system,"SF Pro Text",Roboto,system-ui,sans-serif;
    background:var(--tg-theme-bg-color); color:var(--tg-theme-text-color)}
  header{padding:10px 14px;display:flex;gap:9px;align-items:center;
    background:var(--tg-theme-header-bg-color); border-bottom:1px solid rgba(128,128,128,.14)}
  header b{font-weight:600;font-size:16px}
  #dot{width:8px;height:8px;border-radius:50%;background:#8a99a8;flex:none}
  #dot.on{background:#4dcb5f} #dot.busy{background:#e8a23d} #dot.err{background:#e0554e}
  #sub{margin-left:auto;color:var(--tg-theme-hint-color);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:52%}
  #log{flex:1;overflow-y:auto;padding:12px 12px 4px;display:flex;flex-direction:column;gap:3px}
  .msg{max-width:82%;padding:7px 11px;border-radius:15px;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 1px 1px rgba(0,0,0,.14)}
  .you{align-self:flex-end;background:var(--out);color:#fff;border-bottom-right-radius:5px}
  .bot{align-self:flex-start;background:var(--tg-theme-secondary-bg-color);border-bottom-left-radius:5px}
  .think{align-self:flex-start;color:var(--tg-theme-hint-color);font-style:italic;font-size:13px;padding:2px 10px;box-shadow:none}
  .tool{align-self:flex-start;color:#6cc17d;font-size:12px;padding:2px 10px;box-shadow:none}
  .sys{align-self:center;color:var(--tg-theme-hint-color);font-size:12px;padding:4px}
  #interim{align-self:flex-end;max-width:82%;margin:0 12px 4px;padding:7px 11px;border-radius:15px;
    background:color-mix(in srgb, var(--out) 50%, transparent);color:#e8eef5;font-style:italic;display:none}
  footer{padding:10px 14px calc(12px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:9px;align-items:center;
    background:var(--tg-theme-header-bg-color);border-top:1px solid rgba(128,128,128,.14)}
  #talk{width:66px;height:66px;border-radius:50%;border:none;color:var(--tg-theme-button-text-color);
    background:var(--tg-theme-button-color);font-size:26px;display:flex;align-items:center;justify-content:center;
    touch-action:none;user-select:none;transition:transform .08s, background .2s}
  #talk:active{transform:scale(.92)} #talk.rec{background:#e0554e; box-shadow:0 0 0 7px rgba(224,85,78,.16)} #talk.speaking{background:#8774e1}
  .row{display:flex;gap:6px;align-items:center;color:var(--tg-theme-hint-color);font-size:13px}
  .row input{accent-color:var(--tg-theme-button-color)}
</style>
</head>
<body>
<header><span id="dot"></span><b>Live · Claude</b><span id="sub"></span></header>
<div id="log"></div>
<div id="interim"></div>
<footer>
  <button id="talk" aria-label="hold to talk">🎤</button>
  <label class="row"><input type="checkbox" id="auto"> hands-free&nbsp;·&nbsp;<span style="opacity:.75">headphones recommended</span></label>
</footer>
<script>
const $=s=>document.querySelector(s), log=$('#log'), dot=$('#dot'), interim=$('#interim')
let ws, actx, rec, recActive=false, autoMode=false, holding=false
let playQueue=[], curSource=null, botSpeaking=false
const uuid = location.pathname.replace(/^\/+/,'').split('/')[0]

// ---- Telegram look & feel (theme vars, expand, haptics) when available ----
const tg = window.Telegram && window.Telegram.WebApp
if(tg){
  try{ tg.ready(); tg.expand() }catch{}
  const p = tg.themeParams||{}, S=document.documentElement.style
  const map={bg_color:'--tg-theme-bg-color',secondary_bg_color:'--tg-theme-secondary-bg-color',text_color:'--tg-theme-text-color',hint_color:'--tg-theme-hint-color',button_color:'--tg-theme-button-color',button_text_color:'--tg-theme-button-text-color',link_color:'--tg-theme-link-color',header_bg_color:'--tg-theme-header-bg-color'}
  for(const k in map) if(p[k]) S.setProperty(map[k], p[k])
  if(p.button_color) S.setProperty('--out', p.button_color)
}
function haptic(t){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(t) }catch{} }

function line(cls,text){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; return d }
function sys(t){ line('sys',t) }
function setDot(c){ dot.className=c||'' }
function showInterim(t){ interim.textContent=t; interim.style.display=t?'block':'none'; log.scrollTop=log.scrollHeight }

// ---- connect (uuid from URL is the key; no password) ----
function connect(){
  if(!uuid){ sys('No session link. Get one with /live in your Telegram topic.'); setDot('err'); return }
  const proto = location.protocol==='https:'?'wss':'ws'
  ws = new WebSocket(`${proto}://${location.host}/ws`); ws.binaryType='arraybuffer'
  setDot('busy'); sys('connecting…')
  ws.onopen = ()=> ws.send(JSON.stringify({type:'auth', uuid}))
  ws.onclose= ()=>{ setDot('err'); sys('disconnected') }
  ws.onerror= ()=> setDot('err')
  ws.onmessage = async ev=>{
    if(typeof ev.data!=='string') return playChunk(ev.data)
    const m=JSON.parse(ev.data)
    if(m.type==='ready'){ setDot('on'); $('#sub').textContent=(m.model||'')+(m.where?'  ·  '+m.where:''); sys('connected — talk to Claude'); ensureMic() }
    else if(m.type==='denied'){ setDot('err'); sys('link not recognized — get a fresh one with /live') }
    else if(m.type==='thinking'){ line('think', m.text) }
    else if(m.type==='tool'){ line('tool', '🔧 '+m.name) }
    else if(m.type==='bot'){ line('bot', m.text); haptic('soft') }
    else if(m.type==='turn_end'){ /* answer complete */ }
  }
}

// ---- speech-to-text in the browser (Web Speech API) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition
let finalBuf=''
function ensureMic(){
  if(!SR){ sys('This browser has no speech recognition — use Chrome (Android/desktop).'); return }
  // continuous=false → one utterance per session; send it ONCE on end, so the growing
  // partials Android emits ("hi", "hi how"…) never post as separate lines.
  rec = new SR(); rec.lang='en-US'; rec.continuous=false; rec.interimResults=true
  rec.onresult = e=>{
    let itv='', fin=''
    for(let i=0;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) fin+=r[0].transcript+' '; else itv+=r[0].transcript }
    finalBuf=fin.trim(); showInterim((finalBuf+' '+itv).trim())
    if(itv && botSpeaking) bargeIn()
  }
  rec.onerror = ev=>{ if(ev.error==='not-allowed') sys('microphone blocked — allow it and reload') }
  rec.onend = ()=>{ recActive=false; const t=finalBuf.trim(); finalBuf=''; if(t) sendText(t); if(autoMode||holding){ try{ rec.start(); recActive=true }catch{} } }
  if(autoMode) startRec()
}
function startRec(){ if(!rec||recActive) return; try{ rec.start(); recActive=true; $('#talk').classList.add('rec') }catch{} }
function stopRec(){ if(!rec) return; holding=false; try{ rec.stop() }catch{}; $('#talk').classList.remove('rec') }
function sendText(t){ showInterim(''); line('you', t); haptic('light'); if(ws?.readyState===1){ ws.send(JSON.stringify({type:'text', text:t})); setDot('busy') } }

$('#auto').onchange = e=>{ autoMode=e.target.checked; if(autoMode) startRec(); else stopRec() }
const talk=$('#talk')
talk.addEventListener('pointerdown', e=>{ e.preventDefault(); if(autoMode) return; if(actx?.state==='suspended') actx.resume(); holding=true; startRec() })
const release=e=>{ e.preventDefault(); if(autoMode) return; stopRec() }
talk.addEventListener('pointerup', release); talk.addEventListener('pointercancel', release); talk.addEventListener('pointerleave', release)

// ---- playback of the bot's voice, with barge-in ----
async function playChunk(arrayBuffer){
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)()
  try{ const b=await actx.decodeAudioData(arrayBuffer.slice(0)); playQueue.push(b); if(!botSpeaking) playNext() }catch(e){}
}
function playNext(){
  const b=playQueue.shift()
  if(!b){ botSpeaking=false; setDot('on'); $('#talk').classList.remove('speaking'); return }
  botSpeaking=true; setDot('busy'); $('#talk').classList.add('speaking')
  const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); curSource=s
  s.onended=()=>{ curSource=null; playNext() }; s.start()
}
function bargeIn(){ playQueue=[]; try{curSource?.stop()}catch{}; curSource=null; botSpeaking=false; if(ws?.readyState===1) ws.send(JSON.stringify({type:'interrupt'})) }

connect()
</script>
</body>
</html>
