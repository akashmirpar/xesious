# Reference nginx for the live voice page on app.besporesh.ir.
# The live server listens on 127.0.0.1:3060 and needs WebSocket upgrade + a long
# read timeout (a call holds the socket open). The `map` must sit in the http
# context (top of the site file or conf.d), not inside a server block.
#
# To apply: point app.besporesh.ir's 443 `location /` at 3060 with the headers
# below, keep its existing Certbot ssl_certificate lines, then: nginx -t && systemctl reload nginx

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 443 ssl;
    server_name app.besporesh.ir;

    ssl_certificate     /etc/letsencrypt/live/app.besporesh.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.besporesh.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;   # WebSocket upgrade
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;                          # a call can idle mid-turn
        proxy_send_timeout 3600s;
    }
}
